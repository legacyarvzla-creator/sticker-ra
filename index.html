<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Legacy AR VZLA - Experiencia Estable</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; }
        
        /* Capa de inicio elegante */
        #ui-overlay { 
            position: absolute; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, #2c2c2c 0%, #000000 100%);
            color: white; text-align: center; padding: 20px;
        }

        #startButton { 
            padding: 18px 35px; border-radius: 50px; border: 2px solid #00f2ff; 
            background: rgba(0, 242, 255, 0.1); color: #00f2ff; font-size: 1.1rem; 
            font-weight: bold; cursor: pointer; transition: all 0.3s ease;
            text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }
        
        #startButton:active { transform: scale(0.95); box-shadow: 0 2px 5px rgba(0,242,255,0.2); }

        .instrucciones { margin-top: 25px; font-size: 0.9rem; opacity: 0.8; line-height: 1.4; }
        .branding { color: #00f2ff; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <h2 style="margin-bottom: 10px; letter-spacing: 3px;">LEGACY AR VZLA</h2>
        <button id="startButton">ACTIVA PARA VIVIR LA<br>EXPERIENCIA LEGACY</button>
        <p class="instrucciones">Toca el botón y apunta al logo.<br>¡Haz que tu pasión cobre vida!</p>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: no; filterMinCF: 0.0001; filterBeta: 0.001;" 
             embedded renderer="colorManagement: true; alpha: true" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="vid" src="./video.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" id="target">
            
            <a-entity id="videoContainer" position="0 0 0" rotation="0 0 0">
                <a-video src="#vid" 
                         width="2.5" height="2.5" 
                         position="0 0 0.01" 
                         material="shader: flat; side: double; transparent: true">
                </a-video>
            </a-entity>
            
        </a-entity>
    </a-scene>

    <script>
        const ui = document.querySelector("#ui-overlay");
        const startButton = document.querySelector("#startButton");
        const sceneEl = document.querySelector('a-scene');
        const video = document.querySelector("#vid");

        startButton.addEventListener('click', () => {
            ui.style.display = "none";
            const arSystem = sceneEl.systems["mindar-image-system"];
            arSystem.start(); // Encender cámara
            
            // Lógica de audio para móviles: Pre-carga y play diferido
            video.muted = false; // Intenta audio activado
            video.play().then(() => {
                video.pause(); // Pre-carga
            }).catch(e => {
                console.log("Audio bloqueado, esperando detección...");
                video.muted = true; // Forzar mute si es necesario
                video.play().then(() => video.pause());
            });
        });

        const targetEntity = document.querySelector('#target');
        
        // Control de reproducción estilo Artivive
        targetEntity.addEventListener("targetFound", () => {
            video.play();
        });

        targetEntity.addEventListener("targetLost", () => {
            video.pause();
        });
    </script>
</body>
</html>
