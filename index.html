<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Legacy AR VZLA - Experiencia Motor</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://unpkg.com/aframe-record-component@0.1.3/dist/aframe-record-component.min.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: black; }
        
        /* Capa de inicio con tu toque personal */
        #ui-overlay {
            position: absolute; z-index: 9999; 
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, #1a1a1a 0%, #000000 100%);
            color: white; text-align: center; padding: 20px;
        }

        #startButton { 
            padding: 20px 40px; border-radius: 50px; border: 2px solid #00f2ff; 
            background: rgba(0, 242, 255, 0.1); color: #00f2ff; font-size: 1.1rem; 
            font-weight: bold; cursor: pointer; transition: all 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
        }

        #startButton:active { background: #00f2ff; color: black; transform: scale(0.95); }

        #recordBtn {
            position: absolute; z-index: 1000; bottom: 40px; left: 50%;
            transform: translateX(-50%); padding: 15px 35px;
            border-radius: 50px; border: none; background: #e91e63;
            color: white; font-weight: bold; font-size: 16px;
            display: none; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .instrucciones { margin-top: 25px; font-size: 1rem; color: #C0C0C0; line-height: 1.4; }
        .branding { color: #00f2ff; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <h1 style="letter-spacing: 5px; margin-bottom: 5px;">LEGACY AR</h1>
        <p style="margin-bottom: 30px; opacity: 0.6;">VENEZUELA</p>
        
        <button id="startButton">ACTIVA PARA VIVIR LA<br>EXPERIENCIA LEGACY</button>
        
        <p class="instrucciones">Una vez activado, enfoca el logo de <br><span class="branding">Legacy AR_VZLA</span> y descubre la magia.</p>
    </div>

    <button id="recordBtn">🔴 GRABAR EXPERIENCIA</button>

    <a-scene 
        record="precision: 0.6; fps: 30"
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: no; filterMinCF:0.0001; filterBeta:0.001;" 
        embedded color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="miVideo" src="./video.mp4" preload="auto" loop="true" crossorigin="anonymous" webkit-playsinline playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" id="target">
            <a-video src="#miVideo" width="1.2" height="1.2" position="0 0 0.1" rotation="0 0 0"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const ui = document.querySelector("#ui-overlay");
        const startButton = document.querySelector("#startButton");
        const recordBtn = document.querySelector("#recordBtn");
        const video = document.querySelector("#miVideo");
        const sceneEl = document.querySelector('a-scene');

        startButton.addEventListener('click', () => {
            ui.style.display = "none";
            recordBtn.style.display = "block";
            
            sceneEl.systems['mindar-image-system'].start(); 
            
            // Forzar el audio en la interacción
            video.muted = false;
            video.play().then(() => {
                video.pause(); // Lo dejamos listo para cuando detecte el logo
            }).catch(e => {
                console.log("Audio en espera");
                video.muted = true;
                video.play().then(() => video.pause());
            });
        });

        const targetEntity = document.querySelector('#target');
        targetEntity.addEventListener("targetFound", () => {
            video.play();
        });

        targetEntity.addEventListener("targetLost", () => {
            video.pause();
        });

        // Lógica de Grabación
        let isRecording = false;
        recordBtn.addEventListener('click', () => {
            if (!isRecording) {
                sceneEl.emit('start-recording');
                recordBtn.innerText = "⏹️ DETENER Y GUARDAR";
                recordBtn.style.background = "#fff";
                recordBtn.style.color = "#000";
            } else {
                sceneEl.emit('stop-recording');
                recordBtn.innerText = "🔴 GRABAR EXPERIENCIA";
                recordBtn.style.background = "#e91e63";
                recordBtn.style.color = "#fff";
            }
            isRecording = !isRecording;
        });
    </script>
</body>
</html>
