<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Legacy AR VZLA - Full View</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        /* RESET TOTAL PARA EVITAR PANTALLA DIVIDIDA */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        
        /* FORZAMOS QUE EL CANVAS OCUPE TODO EL ESPACIO REAL */
        canvas { width: 100vw !important; height: 100vh !important; position: absolute; top: 0; left: 0; }

        #ui-overlay {
            position: absolute; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, #1a1a1a 0%, #000000 100%);
            color: white; text-align: center; padding: 20px;
        }

        #startButton { 
            padding: 18px 35px; border-radius: 50px; border: 2px solid #00f2ff; 
            background: rgba(0, 242, 255, 0.1); color: #00f2ff; font-size: 1.1rem; 
            font-weight: bold; cursor: pointer; transition: all 0.3s;
            text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        .instrucciones { margin-top: 25px; font-size: 0.9rem; opacity: 0.8; }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <h2 style="margin-bottom: 5px; letter-spacing: 3px;">LEGACY AR VZLA</h2>
        <button id="startButton">ACTIVA PARA VIVIR LA<br>EXPERIENCIA LEGACY</button>
        <p class="instrucciones">Toca el botón y apunta al logo.<br>¡Haz que tu pasión cobre vida!</p>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: no; filterMinCF:0.0001; filterBeta:0.001;" 
        embedded
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="vid" src="./video.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" id="target">
            <a-video src="#vid" width="2.5" height="2.5" position="0 0 0.05" rotation="0 0 0"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const ui = document.querySelector("#ui-overlay");
        const startButton = document.querySelector("#startButton");
        const video = document.querySelector("#vid");
        const sceneEl = document.querySelector('a-scene');

        startButton.addEventListener('click', () => {
            ui.style.display = "none";
            // Iniciamos el motor MindAR
            sceneEl.systems['mindar-image-system'].start(); 
            
            // "Despertamos" el video para que el audio funcione
            video.play().then(() => {
                video.pause(); 
            }).catch(e => {
                console.log("Esperando detección...");
            });
        });

        const targetEntity = document.querySelector('#target');
        targetEntity.addEventListener("targetFound", () => { video.play(); });
        targetEntity.addEventListener("targetLost", () => { video.pause(); });
    </script>
</body>
</html>
