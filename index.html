<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Legacy AR VZLA - Experiencia Sticker</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://unpkg.com/aframe-record-component@0.1.3/dist/aframe-record-component.min.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: black; }
        
        /* Capa de inicio elegante */
        #ui-overlay {
            position: absolute; z-index: 9999; 
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, #2c2c2c 0%, #000000 100%);
            color: white; text-align: center; padding: 20px;
        }

        #startButton { 
            padding: 18px 35px; border-radius: 50px; border: 2px solid #00f2ff; 
            background: rgba(0, 242, 255, 0.1); color: #00f2ff; font-size: 1.1rem; 
            font-weight: bold; cursor: pointer; transition: all 0.3s;
            text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        #recordBtn {
            position: absolute; z-index: 1000; bottom: 30px; left: 50%;
            transform: translateX(-50%); padding: 15px 30px;
            border-radius: 50px; border: none; background: #e91e63;
            color: white; font-weight: bold; font-size: 16px;
            display: none; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .instrucciones { margin-top: 20px; font-size: 0.9rem; opacity: 0.7; }
        .highlight { color: #00f2ff; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <h2 style="margin-bottom: 10px; letter-spacing: 3px;">LEGACY AR VZLA</h2>
        <button id="startButton">ACTIVA PARA VIVIR LA<br>EXPERIENCIA LEGACY</button>
        <p class="instrucciones">Toca el botón y apunta al <span class="highlight">Logo</span> para ver la magia.</p>
    </div>

    <button id="recordBtn">🔴 GRABAR EXPERIENCIA</button>

    <a-scene 
        record="precision: 0.6; fps: 30"
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: no; filterMinCF:0.0001; filterBeta:0.001;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="miVideo" src="./video.mp4" preload="auto" loop="true" crossorigin="anonymous" webkit-playsinline playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" id="target">
            <a-video src="#miVideo" width="1" height="1" position="0 0 0.05" rotation="0 0 0"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const ui = document.querySelector("#ui-overlay");
        const startButton = document.querySelector("#startButton");
        const recordBtn = document.querySelector("#recordBtn");
        const video = document.querySelector("#miVideo");
        const sceneEl = document.querySelector('a-scene');

        startButton.addEventListener('click', () => {
            ui.style.display = "none";
            recordBtn.style.display = "block";
            
            sceneEl.systems['mindar-image-system'].start(); 
            
            video.play().then(() => {
                video.pause(); 
            }).catch(e => console.log("Esperando interacción..."));
        });

        const targetEntity = document.querySelector('#target');
        targetEntity.addEventListener("targetFound", () => {
            video.play();
        });

        targetEntity.addEventListener("targetLost", () => {
            video.pause();
        });

        // Lógica de Grabación
        let isRecording = false;
        recordBtn.addEventListener('click', () => {
            if (!isRecording) {
                sceneEl.emit('start-recording');
                recordBtn.innerText = "⏹️ DETENER Y GUARDAR";
                recordBtn.style.background = "#fff";
                recordBtn.style.color = "#000";
            } else {
                sceneEl.emit('stop-recording');
                recordBtn.innerText = "🔴 GRABAR EXPERIENCIA";
                recordBtn.style.background = "#e91e63";
                recordBtn.style.color = "#fff";
            }
            isRecording = !isRecording;
        });
    </script>
</body>
</html>
